<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <title>BSS 1815 – Mizisyen & Kontra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="top-bar">
    <h1>BSS 1815 – Jesyon Mizisyen</h1>
    <p class="subtitle">Kontra • Peman • Balans • Seksyon</p>
  </header>

  <main class="main-shell">
    <div class="pill-row">
      <span class="pill" id="total-contracts">Kontra: 0 Gdes</span>
      <span class="pill" id="total-paid">Peye: 0 Gdes</span>
      <span class="pill" id="total-balance">Balans: 0 Gdes</span>
    </div>

    <!-- Filtre pa seksyon -->
    <div class="filter-row">
      <button class="pill filter-btn active" data-section="ALL">Tout</button>
      <button class="pill filter-btn" data-section="Trompette">Trompette</button>
      <button class="pill filter-btn" data-section="Bariton">Bariton</button>
      <button class="pill filter-btn" data-section="Trombone">Trombone</button>
      <button class="pill filter-btn" data-section="Bass">Bass</button>
      <button class="pill filter-btn" data-section="Tambour">Tambour</button>
      <button class="pill filter-btn" data-section="Samba">Samba</button>
      <button class="pill filter-btn" data-section="Percussion">Percussion</button>
    </div>

    <!-- Chèche -->
    <div class="search-row">
      <input
        id="search-input"
        type="text"
        placeholder="Chèche pa non..."
      >
    </div>

    <!-- Tab mizisyen yo -->
    <section class="panel">
      <h2 class="section-title">Tout Mizisyen</h2>
      <div class="table-wrapper">
        <table id="musicians-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Non</th>
              <th>Seksyon</th>
              <th>Enstriman</th>
              <th>Kontra</th>
              <th>Peye</th>
              <th>Balans</th>
              <th>Foto</th>
              <th>Akisyon</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <p id="empty-state" class="empty-state">Pa gen okenn mizisyen anrejistre pou kounya.</p>
    </section>

    <!-- Fòm Ajoute / Edit -->
    <section class="panel">
      <h2 class="section-title">Ajoute / Modifye Mizisyen</h2>
      <form id="musician-form">
        <div class="form-row">
          <input name="id" placeholder="ID (san espas)" required>
          <input name="name" placeholder="Non konplè" required>
          <input name="instrument" placeholder="Enstriman" required>
          <input name="section" placeholder="Seksyon (Trompette, Bass…)" required>
        </div>
        <div class="form-row">
          <input name="contract" type="number" min="0" placeholder="Kontra (Gdes)" required>
          <input name="paid" type="number" min="0" placeholder="Peye (Gdes)" required>
          <input name="balance" type="number" min="0" placeholder="Balans (Gdes)" required>
          <input name="season" placeholder="Sezon (eg. 2026)" required>
        </div>
        <div class="form-row">
          <input name="photoUrl" placeholder="Foto URL (opsyonèl)">
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary">
            Sove mizisyen
          </button>
          <button type="button" id="reset-form" class="btn-secondary">
            Reyajiste
          </button>
        </div>
        <p id="form-status" class="form-status"></p>
      </form>
    </section>
  </main>

  <footer class="footer">
    BSS 1815 • Dashboard Mizisyen • © 2026
  </footer>

  <script src="script.js"></script>
</body>
</html>
