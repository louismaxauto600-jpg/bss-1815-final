<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BSS 1815 Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, black, #ff8c00);
      color: white;
      text-align: center;
    }

    header {
      padding: 30px;
      background: rgba(0,0,0,0.7);
    }

    h1 {
      color: #ffb347;
    }

    .portal-box {
      margin-top: 80px;
      background: rgba(0,0,0,0.6);
      padding: 40px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      border-radius: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      background: #ff8c00;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #ffb347;
    }
  </style>
</head>

<body>

<header>
  <h1>BSS 1815 — Secure Portal</h1>
</header>

<div class="portal-box">

  <h2>Member Access</h2>

  <input type="text" placeholder="Username">

  <input type="password" placeholder="Password">

  <button>Enter Portal</button>

</div>

</body>
</html>
